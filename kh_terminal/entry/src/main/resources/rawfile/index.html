<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="xterm/xterm.css" />
    <script src="xterm/xterm.js"></script>
    <style>
         :root {
            /* 与设置中字号联动，由 JS 写入实际 px */
            --wt-ui-font-base: 22px;
            /* Windows Terminal / Fluent 深色：整体偏黑 + 蓝色强调 */
            --wt-chrome: #1f1f1f;
            --wt-tab-active-bg: #2a2a2a;
            --wt-tab-inactive: transparent;
            --wt-tab-border: transparent;
            --wt-tabbar-border: rgba(255, 255, 255, 0.06);
            --wt-tab-active-fg: #ffffff;
            --wt-tab-active-border: transparent;
            --wt-tab-accent-line: #0078d4;
            --wt-canvas: #0c0c0c;
            --wt-text: rgba(255, 255, 255, 0.78);
            --wt-accent-blue: #0078d4;
            --wt-accent-blue-dim: #0063b1;
            --wt-press-bg: rgba(255, 255, 255, 0.08);
            --wt-transition-fast: 0.12s ease-out;
            --wt-tabs-strip-scrollbar-thumb: #5c5c5c;
            --wt-dropdown-bg: #2d2d2d;
            --wt-dropdown-border: rgba(255, 255, 255, 0.08);
            --wt-dropdown-shadow: 0 8px 32px rgba(0, 0, 0, 0.54), 0 0 1px rgba(0, 0, 0, 0.35);
            --wt-menu-fg: #f3f3f3;
            --wt-menu-hover: rgba(255, 255, 255, 0.06);
            --wt-menu-active: rgba(255, 255, 255, 0.1);
            --wt-menu-sep: rgba(255, 255, 255, 0.06);
            --wt-btn-icon-fg: #e8e8e8;
            --wt-btn-icon-bg: transparent;
            --wt-btn-icon-inset: none;
            --wt-btn-icon-hover-bg: rgba(255, 255, 255, 0.08);
            --wt-btn-icon-hover-border: rgba(255, 255, 255, 0.06);
            --wt-tab-icon-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 1px 2px rgba(0, 0, 0, 0.28);
            --wt-tab-close-hover: rgba(255, 255, 255, 0.08);
            --wt-tab-close-active: rgba(255, 255, 255, 0.12);
            --wt-settings-nav-bg: #2d2d2d;
            --wt-settings-nav-border: rgba(255, 255, 255, 0.06);
            --wt-settings-nav-thumb: #6e6e6e;
            --wt-settings-nav-scroll-track: #2d2d2d;
            --wt-settings-main-bg: #1e1e1e;
            --wt-settings-embed-bg: #1e1e1e;
            --wt-settings-pages-scroll-fg: #6f6f6f;
            --wt-settings-pages-scroll-bg: #1e1e1e;
            --wt-settings-pages-thumb: #5e5e5e;
            --wt-settings-pages-thumb-border: #1e1e1e;
            --wt-settings-footer-bg: #2d2d2d;
            --wt-settings-footer-border: rgba(255, 255, 255, 0.06);
            --wt-set-nav-fg: rgba(255, 255, 255, 0.72);
            --wt-set-nav-active-fg: #ffffff;
            --wt-set-nav-active-bg: rgba(255, 255, 255, 0.06);
            --wt-set-nav-press: rgba(255, 255, 255, 0.04);
            --wt-set-page-desc: rgba(255, 255, 255, 0.58);
            --wt-color-scheme-card-bg: rgba(255, 255, 255, 0.04);
            --wt-color-scheme-card-border: rgba(255, 255, 255, 0.08);
            --wt-color-scheme-card-fg: #f3f3f3;
            --wt-color-scheme-card-hover: rgba(255, 255, 255, 0.07);
            --wt-color-card-p: rgba(255, 255, 255, 0.58);
            --wt-color-scheme-active-bg: rgba(0, 120, 212, 0.14);
            --wt-color-scheme-active-shadow: rgba(0, 120, 212, 0.45);
            --wt-set-page-title: #ffffff;
            --wt-set-card-bg: rgba(255, 255, 255, 0.03);
            --wt-set-card-border: rgba(255, 255, 255, 0.06);
            --wt-set-card-h3: #ffffff;
            --wt-set-card-p: rgba(255, 255, 255, 0.6);
            --wt-set-select-bg: #2d2d2d;
            --wt-set-select-border: rgba(255, 255, 255, 0.12);
            --wt-set-select-fg: #ffffff;
            --wt-toggle-track-off: #5c5c5c;
            --wt-toggle-knob: #ffffff;
            --wt-toggle-knob-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
            --wt-set-btn-primary-fg: #ffffff;
            --wt-set-btn-secondary-border: rgba(255, 255, 255, 0.14);
            --wt-set-btn-secondary-bg: rgba(255, 255, 255, 0.06);
            --wt-set-btn-secondary-fg: #f3f3f3;
            --wt-set-btn-secondary-active-bg: rgba(255, 255, 255, 0.1);
            --wt-settings-actions-border: rgba(255, 255, 255, 0.06);
            --wt-term-rail-bg: #2e2e2e;
            --wt-term-rail-border: rgba(255, 255, 255, 0.12);
            --wt-term-scroll-thumb: linear-gradient(180deg, #d0d0d0 0%, #898989 45%, #606060 100%);
            --wt-term-scroll-thumb-active: linear-gradient(180deg, #e8e8e8 0%, #9a9a9a 100%);
            --wt-term-scroll-thumb-inset: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 4px rgba(0, 0, 0, 0.45);
            --wt-swatch-outline: rgba(0, 0, 0, 0.15);
            --wt-settings-gear-filter: none;
        }
        
        html[data-wt-app-scheme="lightcream"] {
            --wt-chrome: #ece7df;
            --wt-tab-active-bg: rgba(255, 255, 255, 0.72);
            --wt-tab-inactive: transparent;
            --wt-tab-border: transparent;
            --wt-tabbar-border: rgba(0, 0, 0, 0.08);
            --wt-tab-active-fg: #1a1a1a;
            --wt-tab-accent-line: #0f6cbd;
            --wt-canvas: #faf7f0;
            --wt-text: rgba(0, 0, 0, 0.74);
            --wt-accent-blue: #0f6cbd;
            --wt-accent-blue-dim: #0a5599;
            --wt-press-bg: rgba(0, 0, 0, 0.06);
            --wt-tabs-strip-scrollbar-thumb: #9e988e;
            --wt-dropdown-bg: #ffffff;
            --wt-dropdown-border: rgba(0, 0, 0, 0.1);
            --wt-dropdown-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
            --wt-menu-fg: #1a1a1a;
            --wt-menu-hover: rgba(0, 0, 0, 0.04);
            --wt-menu-active: rgba(0, 0, 0, 0.08);
            --wt-menu-sep: rgba(0, 0, 0, 0.08);
            --wt-btn-icon-fg: #242424;
            --wt-btn-icon-bg: transparent;
            --wt-btn-icon-inset: none;
            --wt-btn-icon-hover-bg: rgba(0, 0, 0, 0.06);
            --wt-btn-icon-hover-border: rgba(0, 0, 0, 0.08);
            --wt-tab-icon-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 1px 2px rgba(0, 0, 0, 0.12);
            --wt-tab-close-hover: rgba(0, 0, 0, 0.06);
            --wt-tab-close-active: rgba(0, 0, 0, 0.1);
            --wt-settings-nav-bg: #f0ebe3;
            --wt-settings-nav-border: rgba(0, 0, 0, 0.08);
            --wt-settings-nav-thumb: #a39e94;
            --wt-settings-nav-scroll-track: #f0ebe3;
            --wt-settings-main-bg: #faf7f0;
            --wt-settings-embed-bg: #faf7f0;
            --wt-settings-pages-scroll-fg: #a39e94;
            --wt-settings-pages-scroll-bg: #faf7f0;
            --wt-settings-pages-thumb: #b8b3a8;
            --wt-settings-pages-thumb-border: #faf7f0;
            --wt-settings-footer-bg: #f5f2eb;
            --wt-settings-footer-border: rgba(0, 0, 0, 0.08);
            --wt-set-nav-fg: rgba(0, 0, 0, 0.68);
            --wt-set-nav-active-fg: #141414;
            --wt-set-nav-active-bg: rgba(0, 0, 0, 0.05);
            --wt-set-nav-press: rgba(0, 0, 0, 0.04);
            --wt-set-page-desc: rgba(0, 0, 0, 0.54);
            --wt-color-scheme-card-bg: rgba(255, 255, 255, 0.7);
            --wt-color-scheme-card-border: rgba(0, 0, 0, 0.1);
            --wt-color-scheme-card-fg: #141414;
            --wt-color-scheme-card-hover: rgba(0, 0, 0, 0.03);
            --wt-color-card-p: rgba(0, 0, 0, 0.54);
            --wt-color-scheme-active-bg: rgba(15, 108, 189, 0.12);
            --wt-color-scheme-active-shadow: rgba(15, 108, 189, 0.38);
            --wt-set-page-title: #141414;
            --wt-set-card-bg: rgba(255, 255, 255, 0.55);
            --wt-set-card-border: rgba(0, 0, 0, 0.1);
            --wt-set-card-h3: #141414;
            --wt-set-card-p: rgba(0, 0, 0, 0.58);
            --wt-set-select-bg: #ffffff;
            --wt-set-select-border: rgba(0, 0, 0, 0.12);
            --wt-set-select-fg: #1a1a1a;
            --wt-toggle-track-off: #9a948a;
            --wt-toggle-knob: #ffffff;
            --wt-toggle-knob-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
            --wt-set-btn-primary-fg: #ffffff;
            --wt-set-btn-secondary-border: rgba(0, 0, 0, 0.12);
            --wt-set-btn-secondary-bg: rgba(0, 0, 0, 0.04);
            --wt-set-btn-secondary-fg: #1a1a1a;
            --wt-set-btn-secondary-active-bg: rgba(0, 0, 0, 0.07);
            --wt-settings-actions-border: rgba(0, 0, 0, 0.08);
            --wt-term-rail-bg: #ede8df;
            --wt-term-rail-border: rgba(0, 0, 0, 0.1);
            --wt-term-scroll-thumb: linear-gradient(180deg, #ffffff 0%, #c4bfb6 42%, #9e988e 100%);
            --wt-term-scroll-thumb-active: linear-gradient(180deg, #ffffff 0%, #aeaaa2 100%);
            --wt-term-scroll-thumb-inset: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 2px 4px rgba(0, 0, 0, 0.2);
            --wt-swatch-outline: rgba(0, 0, 0, 0.12);
            --wt-settings-gear-filter: brightness(0.25);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            max-height: 100%;
            background-color: var(--wt-chrome);
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            /* 避免 WebView 内整页随内容/焦点滚动，把菜单栏顶出视口 */
            position: fixed;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI Variable', 'Segoe UI', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
        }
        
        #wt-root.wt-root--hide-tabs-strip #wt-tabs-strip {
            display: none !important;
        }
        
        #wt-tabs-strip.wt-tabs-strip--compact .wt-tab:not(.wt-tab-active) {
            max-width: 52px;
            min-width: 44px;
            padding: 0 8px 0 6px;
            overflow: hidden;
        }
        
        #wt-tabs-strip.wt-tabs-strip--compact .wt-tab:not(.wt-tab-active) .wt-tab-title {
            display: none;
        }
        
        #wt-tabbar.wt-tabbar--acrylic {
            background: rgba(45, 45, 45, 0.72);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        html[data-wt-app-scheme="lightcream"] #wt-tabbar.wt-tabbar--acrylic {
            background: rgba(230, 226, 216, 0.78);
        }
        
        #wt-root.wt-root--no-pane-anim .wt-term-pane,
        #wt-root.wt-root--no-pane-anim .wt-tab {
            transition: none !important;
        }
        
        .wt-color-scheme-toolbar {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            max-width: 720px;
        }
        
        .wt-color-scheme-add {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-set-btn-secondary-bg);
            color: var(--wt-set-btn-secondary-fg);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            cursor: not-allowed;
            opacity: 0.55;
        }
        
        .wt-color-scheme-list.wt-color-scheme-list--vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 720px;
        }
        
        .wt-color-scheme-card.wt-color-scheme-card--row {
            width: 100%;
            max-width: none;
            margin: 0;
            justify-content: flex-start;
        }
        
        .wt-color-scheme-card.wt-color-scheme-card--row .wt-color-card-text h3 {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .wt-set-btn-danger {
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid #c42b1c;
            background: rgba(196, 43, 28, 0.12);
            color: #ff8a78;
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            cursor: pointer;
        }
        
        .wt-set-btn-danger:hover {
            background: rgba(196, 43, 28, 0.2);
        }
        
        .wt-set-btn-danger:active {
            background: rgba(196, 43, 28, 0.28);
        }
        
        html[data-wt-app-scheme="lightcream"] .wt-set-btn-danger {
            color: #a4262c;
            border-color: #c42b1c;
            background: rgba(196, 43, 28, 0.08);
        }
        
        .wt-actions-toolbar {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            max-width: 720px;
        }
        
        .wt-actions-toolbar-hint {
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            color: var(--wt-set-page-desc);
        }
        
        .wt-actions-add-btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-set-btn-secondary-bg);
            color: var(--wt-set-btn-secondary-fg);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            cursor: not-allowed;
            opacity: 0.55;
        }
        
        .wt-actions-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 800px;
            max-height: min(72vh, 680px);
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .wt-action-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 14px;
            border-radius: 6px;
            background: var(--wt-set-card-bg);
            border: 1px solid var(--wt-set-card-border);
        }
        
        .wt-action-label {
            font-size: calc(var(--wt-ui-font-base) * 1);
            color: var(--wt-set-card-h3);
            line-height: 1.45;
            flex: 1;
            min-width: 0;
        }
        
        .wt-action-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            flex-shrink: 0;
            max-width: 56%;
        }
        
        .wt-key-pill {
            font-family: Consolas, 'Cascadia Mono', 'Sarasa Mono SC', monospace;
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-chrome);
            color: var(--wt-set-card-h3);
            white-space: nowrap;
        }
        
        .wt-color-scheme-badge {
            font-size: calc(var(--wt-ui-font-base) * 0.7857);
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--wt-accent-blue);
            color: var(--wt-set-btn-primary-fg);
        }
        
        .wt-set-toggle.wt-toggle-disabled {
            opacity: 0.45;
            pointer-events: none;
        }
        
        .wt-set-link-inline {
            display: inline-block;
            margin-top: 8px;
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            color: var(--wt-accent-blue);
            text-decoration: none;
        }
        
        .wt-set-link-inline:hover {
            text-decoration: underline;
        }
        
        .wt-set-page-h2 {
            font-size: calc(var(--wt-ui-font-base) * 1.1);
            font-weight: 600;
            color: var(--wt-set-page-title);
            margin: 28px 0 12px;
            max-width: 720px;
        }
        
        .wt-ntm-list-wrap {
            border: 1px solid var(--wt-set-card-border);
            border-radius: 6px;
            background: var(--wt-set-card-bg);
            max-width: 720px;
            overflow: hidden;
        }
        
        .wt-ntm-list-head {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 12px;
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            color: var(--wt-set-page-desc);
            border-bottom: 1px solid var(--wt-set-card-border);
        }
        
        .wt-ntm-row {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--wt-set-card-border);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            color: var(--wt-set-card-h3);
        }
        
        .wt-ntm-row:last-child {
            border-bottom: none;
        }
        
        .wt-ntm-row-tools {
            display: flex;
            flex-direction: row;
            gap: 4px;
            align-items: center;
        }
        
        .wt-ntm-icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--wt-set-card-h3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }
        
        .wt-ntm-icon-btn:hover {
            background: var(--wt-set-btn-secondary-active-bg);
        }
        
        .wt-ntm-icon-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        
        .wt-ntm-bulk {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0 24px;
            max-width: 720px;
        }
        
        .wt-ntm-bulk button {
            padding: 8px 14px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-set-btn-secondary-bg);
            color: var(--wt-set-btn-secondary-fg);
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .wt-ntm-add-section {
            max-width: 720px;
            border: 1px solid var(--wt-set-card-border);
            border-radius: 6px;
            background: var(--wt-set-card-bg);
            overflow: hidden;
        }
        
        .wt-ntm-add-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--wt-set-card-border);
        }
        
        .wt-ntm-add-row:last-child {
            border-bottom: none;
        }
        
        .wt-ntm-add-row-lead h4 {
            margin: 0 0 4px;
            font-size: calc(var(--wt-ui-font-base) * 1);
            font-weight: 600;
            color: var(--wt-set-card-h3);
        }
        
        .wt-ntm-add-row-lead p {
            margin: 0;
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            color: var(--wt-set-card-p);
            line-height: 1.4;
        }
        
        .wt-ntm-add-row-ctrl {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .wt-ntm-add-btn {
            min-width: 40px;
            height: 36px;
            padding: 0 14px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-set-btn-secondary-bg);
            color: var(--wt-set-btn-secondary-fg);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        
        .wt-ntm-add-btn:hover:not(:disabled) {
            background: var(--wt-set-btn-secondary-active-bg);
        }
        
        .wt-ntm-add-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        
        .wt-ntm-folder-input {
            width: 140px;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-btn-secondary-border);
            background: var(--wt-chrome);
            color: var(--wt-text);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
        }
        
        .wt-ext-muted {
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            color: var(--wt-set-page-desc);
            max-width: 720px;
            margin: 0 0 16px;
            line-height: 1.45;
        }
        
        .wt-ext-card {
            display: grid;
            grid-template-columns: 40px 1fr auto auto;
            gap: 12px;
            align-items: center;
            max-width: 720px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid var(--wt-set-card-border);
            background: var(--wt-set-card-bg);
        }
        
        .wt-ext-card-ico {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: var(--wt-chrome);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .wt-ext-card-body h4 {
            margin: 0 0 4px;
            font-size: calc(var(--wt-ui-font-base) * 1);
            font-weight: 600;
            color: var(--wt-set-card-h3);
        }
        
        .wt-ext-card-body p {
            margin: 0;
            font-size: calc(var(--wt-ui-font-base) * 0.7857);
            color: var(--wt-set-card-p);
            font-family: Consolas, 'Cascadia Mono', monospace;
            word-break: break-all;
        }

            cursor: default;

        .wt-set-range-row input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
            background: transparent;
        }
        
        .wt-set-range-row input[type="range"]::-moz-range-track {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.12);
        }
        
        html[data-wt-app-scheme="lightcream"] .wt-set-range-row input[type="range"]::-moz-range-track {
            background: rgba(0, 0, 0, 0.12);
        }
        
        .wt-set-range-row input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--wt-accent-blue);
            border: 2px solid rgba(255, 255, 255, 0.95);

            cursor: default;

        .wt-set-range-val {
            min-width: 42px;
            text-align: right;
            font-size: calc(var(--wt-ui-font-base) * 0.8571);
            color: var(--wt-set-card-p);
        }
        
        .wt-set-input.wt-set-input-sm {
            min-width: 72px;
            max-width: 96px;
        }

            flex-shrink: 0;
        }

            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: calc(var(--wt-ui-font-base) * 0.9286);

            cursor: default;
        }
        
        .wt-term-pane-inner.wt-term-pane-acrylic {
            backdrop-filter: blur(14px) saturate(1.2);
            -webkit-backdrop-filter: blur(14px) saturate(1.2);
        }
        
        .wt-set-readonly-value {
            display: inline-block;
            min-width: 220px;
            max-width: 320px;

            background: var(--wt-set-select-bg);
            color: var(--wt-set-card-p);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            text-align: right;
            box-sizing: border-box;
        }
        
        .wt-set-select {
            min-width: 280px;
            max-width: 360px;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-select-border);
            background: var(--wt-set-select-bg);
            color: var(--wt-set-select-fg);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
        }
        
        .wt-set-input {
            min-width: 280px;
            max-width: 360px;
            width: 100%;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid var(--wt-set-select-border);
            background: var(--wt-set-select-bg);
            color: var(--wt-set-select-fg);
            font-size: calc(var(--wt-ui-font-base) * 0.9286);
            font-family: inherit;
            box-sizing: border-box;
        }

            font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
        }
        
        .wt-set-input.wt-set-input-url {
            max-width: 420px;
        }
        
        .wt-set-toggle {
            width: 46px;
            height: 24px;
            border-radius: 12px;
            background: var(--wt-toggle-track-off);

            flex-shrink: 0;
            cursor: default;
            transition: background var(--wt-transition-fast);

        .wt-set-toggle.wt-on {

        .wt-set-toggle::after {

            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--wt-toggle-knob);
            top: 3px;
            left: 3px;
            transition: transform var(--wt-transition-fast);
            box-shadow: var(--wt-toggle-knob-shadow);

        .wt-set-toggle.wt-on::after {
            transform: translateX(22px);

                max-width: none;
                width: 100%;
                min-width: 0;

        .wt-settings-pane.wt-term-pane {
            padding: 0;
            overflow: hidden;
        }
        
        .wt-settings-embed {
            width: 100%;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--wt-settings-embed-bg);
            box-sizing: border-box;
        }
        
        .wt-settings-embed>.wt-settings-body {
            flex: 1;
            min-height: 0;
        }
        
        #terminal-stack {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            position: relative;
            background-color: var(--wt-canvas);
            overflow: hidden;
        }
        
        .wt-term-pane {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            padding: 8px 10px 10px 10px;
            box-sizing: border-box;
            display: none;
            overflow: hidden;
        }
        
        .wt-term-pane.wt-pane-visible {
            display: block;
        }
        /* Shell 标签：左侧 xterm + 右侧自定义滚动条（WebView 常不画原生条/canvas 吃掉触摸） */
        
        .wt-term-pane-inner {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            width: 100%;
            height: 100%;
            min-height: 0;
            box-sizing: border-box;
        }
        
        .wt-xterm-anchor {
            flex: 1 1 auto;
            min-width: 0;
            min-height: 0;
            position: relative;
        }
        
        .wt-term-scroll-rail {
            flex: 0 0 24px;
            width: 24px;
            min-width: 24px;
            background: var(--wt-term-rail-bg);
            border-left: 1px solid var(--wt-term-rail-border);
            box-sizing: border-box;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            z-index: 6;
        }
        
        .wt-term-scroll-track {
            position: relative;
            height: 100%;
            width: 100%;
            padding: 0 3px;
            box-sizing: border-box;
        }
        
        .wt-term-scroll-thumb {
            position: absolute;
            left: 2px;
            right: 2px;
            top: 0;
            min-height: 40px;
            height: 48px;
            border-radius: 8px;
            background: var(--wt-term-scroll-thumb);
            box-shadow: var(--wt-term-scroll-thumb-inset);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }
        
        .wt-term-scroll-thumb:active {
            cursor: grabbing;
            background: var(--wt-term-scroll-thumb-active);
        }
        
        .wt-term-scroll-thumb.wt-thumb-idle {
            opacity: 0.45;
        }
        
        .xterm {
            height: 100%;
            max-height: 100%;
            overflow: hidden;
        }
        /* 使用右侧 wt-term-scroll-*，此处隐藏原生条避免双轨 */
        
        .xterm .xterm-viewport {
            overflow-y: scroll !important;
            overflow-x: hidden !important;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .xterm .xterm-viewport::-webkit-scrollbar {
            width: 0 !important;
            height: 0 !important;
            display: none;
        }
        
        @media (max-width: 600px) {
            .wt-settings-nav {
                flex: 0 0 64px;
            }
            .wt-set-nav-item span:last-child {
                display: none;
            }
            .wt-set-nav-item {
                justify-content: center;
                padding: 12px 8px;
            }
            .wt-set-card {
                flex-direction: column;
            }
        }
    </style>

                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-tab-title-mode" aria-label="选项卡标题">
                                        <option value="none">无（跟随 shell）</option>
                                        <option value="profileName">使用配置文件名称</option>
                                    </select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>以管理员身份运行此配置文件</h3>
                                    <p>对应提升权限启动；当前环境由系统集成决定，此项仅持久化偏好与说明。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <button type="button" class="wt-set-toggle wt-def-elevate" aria-pressed="false" title="开关"></button>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">其他设置</h2>
                            <button type="button" class="wt-set-sub-row" data-profile-subnav="profileDefaultsAppearance" title="打开默认值外观设置">
                                <span>外观</span>
                                <span class="wt-set-sub-chevron" aria-hidden="true">›</span>
                            </button>
                            <button type="button" class="wt-set-sub-row wt-set-sub-row--disabled" disabled title="即将支持">终端仿真<span class="wt-set-sub-chevron" aria-hidden="true">›</span></button>
                            <button type="button" class="wt-set-sub-row wt-set-sub-row--disabled" disabled title="即将支持">高级<span class="wt-set-sub-chevron" aria-hidden="true">›</span></button>
                        </section>
                        <section class="wt-set-page" data-page="profileDefaultsAppearance">
                            <div class="wt-set-breadcrumb">
                                <button type="button" data-profile-breadcrumb-back="profileDefaults">默认值</button>
                                <span aria-hidden="true"> › </span>
                                <span>外观</span>
                            </div>
                            <h1 class="wt-set-page-title">默认值 &gt; 外观</h1>
                            <p class="wt-set-page-hero-desc">此处设置作用于所有配置文件的终端外观，除非某配置文件单独覆盖。预览为示意，实际渲染以 xterm 为准。</p>
                            <div class="wt-def-term-preview">
                                <div class="wt-def-term-preview-head">终端预览</div>
                                <div class="wt-def-term-preview-body" aria-hidden="true"></div>
                            </div>
                            <h2 class="wt-set-page-h3">文本</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>配色方案</h3>
                                    <p>与「设置 → 配色方案」同一套预设；可展开以覆盖前景/背景（通过全局配色方案页同步）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-scheme-select" aria-label="配色方案"></select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>字体</h3>
                                    <p>主字体族名，回退链与内置 WT 一致。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="text" class="wt-set-input wt-def-font-family" autocomplete="off" spellcheck="false" aria-label="字体">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>显示所有字体</h3>
                                    <p>列表枚举系统字体（Web 环境受限，占位）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <label class="wt-set-checkbox-label"><input type="checkbox" class="wt-def-show-all-fonts" disabled> 显示所有字体</label>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>字号</h3>
                                    <p>像素字号，与「外观」页、Ctrl+滚轮缩放联动（8–36）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="number" class="wt-set-input wt-set-input-sm wt-def-fontsize" min="8" max="36" step="1" aria-label="字号">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>行高</h3>
                                    <p>相对字号的行高倍数（例如 1.2）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="number" class="wt-set-input wt-set-input-sm wt-def-line-height" min="1" max="3" step="0.05" aria-label="行高">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>单元格宽度</h3>
                                    <p>对应 xterm <code>letterSpacing</code>（像素级字符间距）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="number" class="wt-set-input wt-set-input-sm wt-def-letter-spacing" min="-2" max="8" step="0.1" aria-label="单元格宽度">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>字体粗细</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-font-weight" aria-label="字体粗细">
                                        <option value="normal">正常</option>
                                        <option value="bold">粗体</option>
                                        <option value="100">100</option>
                                        <option value="400">400</option>
                                        <option value="600">600</option>
                                        <option value="700">700</option>
                                    </select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>内置字形</h3>
                                    <p>使用终端绘制框线字符等（xterm 管线占位，偏好持久化）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <button type="button" class="wt-set-toggle wt-def-custom-glyphs" aria-pressed="true" title="开关"></button>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">渲染</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>全色表符号</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <button type="button" class="wt-set-toggle wt-def-color-emoji" aria-pressed="true" title="开关"></button>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>复古终端效果</h3>
                                    <p>扫描线等（当前未接 shader，占位）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <button type="button" class="wt-set-toggle wt-def-retro" aria-pressed="false" title="开关"></button>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>自动调整无法区分的文本</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-adjust-colors" aria-label="对比度调整">
                                        <option value="never">从不</option>
                                        <option value="indexed">索引色时</option>
                                        <option value="always">始终</option>
                                    </select>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">光标</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>光标形状</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-cursor-style" aria-label="光标形状">
                                        <option value="bar">条形 (|)</option>
                                        <option value="block">方块</option>
                                        <option value="underline">下划线</option>
                                    </select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>光标颜色</h3>
                                    <p>留空则使用配色方案默认；可填 <code>#RRGGBB</code> 覆盖。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="text" class="wt-set-input wt-def-cursor-color" autocomplete="off" placeholder="#FFFFFF" aria-label="光标颜色">
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">背景图像</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>背景图像路径</h3>
                                    <p>Web 环境请尽量使用 <code>http(s)</code> / <code>data:</code> 可访问地址；本地路径依赖宿主解析。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="text" class="wt-set-input wt-def-bg-path" autocomplete="off" spellcheck="false" aria-label="背景图像路径">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>拉伸模式</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-bg-stretch" aria-label="背景拉伸">
                                        <option value="uniformToFill">均匀填充</option>
                                        <option value="uniform">均匀</option>
                                        <option value="fill">填充</option>
                                        <option value="none">无拉伸</option>
                                    </select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>对齐</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-bg-align" aria-label="背景对齐">
                                        <option value="center">居中</option>
                                        <option value="top">靠上</option>
                                        <option value="bottom">靠下</option>
                                        <option value="left">靠左</option>
                                        <option value="right">靠右</option>
                                        <option value="topLeft">左上</option>
                                        <option value="topRight">右上</option>
                                        <option value="bottomLeft">左下</option>
                                        <option value="bottomRight">右下</option>
                                    </select>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>背景图像不透明度</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <div class="wt-set-range-row">
                                        <input type="range" class="wt-def-bg-img-opacity" min="0" max="100" step="1" aria-valuemin="0" aria-valuemax="100" aria-label="背景图像不透明度">
                                        <span class="wt-set-range-val wt-def-bg-img-opacity-val">100%</span>
                                    </div>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">文本格式</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>强调文本样式</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-intense-style" aria-label="强调文本">
                                        <option value="bright">亮色</option>
                                        <option value="bold">粗体</option>
                                        <option value="all">全部</option>
                                        <option value="none">无</option>
                                    </select>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">透明度</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>背景不透明度</h3>
                                    <p>终端画布背景色的 Alpha（100 为不透明）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <div class="wt-set-range-row">
                                        <input type="range" class="wt-def-terminal-bg-opacity" min="10" max="100" step="1" aria-label="背景不透明度">
                                        <span class="wt-set-range-val wt-def-terminal-bg-opacity-val">100%</span>
                                    </div>
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>启用亚克力材料</h3>
                                    <p>窗格区域背景模糊（WebView 支持 <code>backdrop-filter</code> 时可见）。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <button type="button" class="wt-set-toggle wt-def-acrylic" aria-pressed="false" title="开关"></button>
                                </div>
                            </div>
                            <h2 class="wt-set-page-h3">窗口</h2>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>边距</h3>
                                    <p>四边像素，格式与 WT 相同，例如 <code>8, 8, 8, 8</code>。</p>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <input type="text" class="wt-set-input wt-def-padding" autocomplete="off" spellcheck="false" aria-label="边距">
                                </div>
                            </div>
                            <div class="wt-set-card">
                                <div class="wt-set-card-lead">
                                    <h3>滚动条可见性</h3>
                                </div>
                                <div class="wt-set-card-ctrl">
                                    <select class="wt-set-select wt-def-scrollbar" aria-label="滚动条">
                                        <option value="visible">可见</option>
                                        <option value="hidden">隐藏</option>
                                    </select>
                                </div>
                            </div>
                        </section>
                    </div>
                    <footer class="wt-settings-footer">
                        <button type="button" class="wt-set-btn-secondary wt-set-discard-btn">放弃更改</button>
                        <button type="button" class="wt-set-btn-primary wt-set-save-btn">保存</button>
                    </footer>
                </div>
            </div>
        </div>
    </template>
    <script src="terminal-app.js"></script>
</body>
